<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Server Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 400px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: #61dafb;
            font-size: 24px;
        }
        .input-group {
            margin: 20px 0;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
        }
        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 10px;
            background-color: #3c3c3c;
            border: 1px solid #555;
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
            margin-bottom: 10px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #61dafb;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        #startBtn {
            background-color: #28a745;
            color: white;
        }
        #startBtn:hover {
            background-color: #218838;
        }
        #startBtn:disabled {
            background-color: #444;
            cursor: not-allowed;
            color: #888;
        }
        #stopBtn {
            background-color: #dc3545;
            color: white;
            display: none;
        }
        #stopBtn:hover {
            background-color: #c82333;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }
        .status-success {
            background-color: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }
        .status-error {
            background-color: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid #dc3545;
        }
        .status-info {
            background-color: rgba(100, 100, 100, 0.2);
            color: #ccc;
            border: 1px solid #555;
        }
        .log-container {
            margin-top: 15px;
            height: 100px;
            background-color: #000;
            border-radius: 6px;
            padding: 10px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            text-align: left;
            border: 1px solid #444;
        }
        .log-entry {
            margin-bottom: 2px;
        }
        .log-error { color: #ff5555; }
        .log-success { color: #55ff55; }
        .log-info { color: #55ffff; }
    </style>
</head>
<body>

<div class="container">
    <h1>LLM Server</h1>

    <div class="input-group">
        <label for="modelFile">Выберите GGUF файл:</label>
        <input type="file" id="modelFile" accept=".gguf">
    </div>

    <div class="input-group">
        <label for="customArgs">Дополнительные аргументы (разделено пробелами):</label>
        <input type="text" id="customArgs" placeholder="-c 16384 -ngl 99 --port 8080 -t 6 --no-mmap --flash-attn on" value="-c 16384 -ngl 99 --port 8080 -t 6 --no-mmap --flash-attn on">
    </div>

    <div class="input-group">
        <label for="host">Хост (IP/Port):</label>
        <input type="text" id="host" value="0.0.0.0:8080">
    </div>

    <button id="startBtn">Запустить</button>
    <button id="stopBtn">Остановить</button>

    <div id="status" class="status status-info">Статус: Не запущено</div>
    <div class="log-container" id="console">
        <div class="log-entry">Ожидание запуска...</div>
    </div>
</div>

<script>
    let selectedFile = null;
    let currentProcess = null;
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusDiv = document.getElementById('status');
    const consoleDiv = document.getElementById('console');

    // Обновление статуса
    function setStatus(message, type = 'info') {
        statusDiv.textContent = `Статус: ${message}`;
        statusDiv.className = 'status ' + type;

        // Добавляем в консоль
        addLog(message, type);
    }

    // Добавление строки в консоль
    function addLog(text, type) {
        const div = document.createElement('div');
        div.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString();
        div.textContent = `[${time}] ${text}`;
        consoleDiv.appendChild(div);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    // Обработка выбора файла
    document.getElementById('modelFile').addEventListener('change', function(e) {
        if (e.target.files && e.target.files[0]) {
            selectedFile = e.target.files[0];
            addLog(`Файл выбран: ${selectedFile.name} (${selectedFile.size} bytes)`, 'success');
        } else {
            selectedFile = null;
            addLog('Файл не выбран', 'error');
        }
    });

    // Запуск процесса
    startBtn.addEventListener('click', async () => {
        if (!selectedFile) {
            setStatus('Ошибка: Выберите файл GGUF', 'error');
            return;
        }

        if (currentProcess) {
            addLog('Процесс уже запущен', 'error');
            return;
        }

        startBtn.disabled = true;
        stopBtn.style.display = 'none';

        const customArgsStr = document.getElementById('customArgs').value;
        const host = document.getElementById('host').value;

        // Формируем аргументы
        const args = [
            selectedFile,
            customArgsStr ? customArgsStr.split(/[\s\t]+/).filter(Boolean) : []
        ];

        // Проверка на существование файла
        if (!await checkFileExistance(selectedFile)) {
            setStatus('Ошибка: Файл не найден в указанном месте', 'error');
            startBtn.disabled = false;
            return;
        }

        addLog(`Запуск процесса: ${selectedFile.name}...`, 'info');

        try {
            // Запуск через PowerShell (Start-Process)
            currentProcess = Start-Process -FilePath "llama-server.exe" -ArgumentList args -WindowStyle Hidden -PassThru;

            // Если процесс запустился
            if (currentProcess) {
                addLog('Процесс запущен. PID: ' + currentProcess.Id, 'success');
                setStatus('Запущено', 'success');
                stopBtn.style.display = 'block';

                // Запускаем таймер обновления статуса (проверяем, еще ли запущен процесс)
                updateProcessStatus();
            } else {
                throw new Error('Не удалось запустить процесс');
            }
        } catch (error) {
            addLog('Ошибка запуска: ' + error.message, 'error');
            setStatus('Ошибка запуска', 'error');
        } finally {
            startBtn.disabled = false;
        }
    });

    // Остановка процесса
    stopBtn.addEventListener('click', () => {
        if (!currentProcess) {
            addLog('Ничего не запущено', 'info');
            return;
        }

        addLog('Остановка процесса...', 'info');
        startBtn.disabled = true;
        stopBtn.disabled = true;

        // Попробуем остановить через Stop-Process
        try {
            Stop-Process -Name 'llama-server.exe' -Force -ErrorAction SilentlyContinue;
            setStatus('Остановлено', 'success');
            currentProcess = null;
            setTimeout(() => setStatus('Не запущено', 'info'), 3000);
            stopBtn.disabled = false;
        } catch (e) {
            // Если Stop-Process не сработал, пробуем через System.Diagnostics
            try {
                Process[] procs = [Get-Process | Where-Object { $_.CommandLine -like "*llama-server*" }];
                if (procs.Count > 0) {
                    procs[0].Kill();
                    addLog('Процесс принудительно остановлен', 'success');
                } else {
                    throw new Error('Не удалось найти процесс');
                }
            } catch {
                addLog('Ошибка остановки: ' + e.message, 'error');
            }
        }
    });

    // Проверка существования файла (после выбора)
    async function checkFileExistance(file) {
        try {
            await new Promise(r => setTimeout(r, 100)); // Небольшая задержка для надежности
            return true;
        } catch {
            return false;
        }
    }

    // Обновление статуса запущенности (таймер)
    let lastPing = 0;
    function updateProcessStatus() {
        if (!currentProcess) return;

        const now = Date.now();
        if (now - lastPing < 2000) return; // Проверяем не чаще 2 секунд
        lastPing = now;

        try {
            // Простая проверка через Get-Process или System.Diagnostics
            const ps = new System.Diagnostics.Process();
            const start = ps.StartInfo;
            start.FileName = "powershell";
            start.Arguments = "-Command " + `Get-Process -ErrorAction SilentlyContinue | Where-Object { $_.CommandLine -like "*llama-server*" }`;
            start.UseShellExecute = false;
            start.CreateNoWindow = true;
            start.RedirectStandardOutput = true;
            start.RedirectStandardError = true;

            using (var output = new System.IO.StreamWriter(ps.StandardOutput, true, new System.Text.UTF8Encoding(false))) {
                using (var error = new System.IO.StreamWriter(ps.StandardError, true, new System.Text.UTF8Encoding(false))) {
                    ps.Start();
                    ps.WaitForExit(100); // Ждем 100мс
                    if (ps.ExitCode === 0) {
                        addLog('Процесс запущен и активен', 'success');
                    }
                }
            }
        } catch {
            // Если процесс умер
            setStatus('Процесс не запущен', 'error');
            currentProcess = null;
            stopBtn.disabled = false;
            setTimeout(() => setStatus('Не запущено', 'info'), 3000);
        }
        setTimeout(updateProcessStatus, 3000); // Следующая проверка через 3 секунды
    }
</script>

</body>
</html>
